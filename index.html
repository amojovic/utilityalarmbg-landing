<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtilityAlarmBG - Претплата</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    max-width: 400px;
    text-align: center;
  }
  h1 {
    color: #333;
    margin-bottom: 10px;
  }
  p {
    color: #555;
    margin-bottom: 30px;
  }
  .price-card {
    background: #f0f8ff;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #d0e7ff;
  }
  .price-card h2 {
    margin: 0 0 10px 0;
    color: #007BFF;
  }
  .price-card button {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #007BFF;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .price-card button:hover {
    background: #0056b3;
  }
</style>
</head>
<body>

<div class="container">
  <h1>UtilityAlarmBG</h1>
  <p>Претплатите се и будите увек обавештени о искључењима струје и воде!</p>

  <div class="price-card">
    <h2>Месечна претплата: 3€</h2>
    <button onclick="alert('Софтвер још није спреман, али можете преузети алфа верзију овде: https://drive.google.com/file/d/1IZgpm5DGQhVbkGPssvxN9I4gC9uuy3fG/view?usp=sharing')">
      Пријави се
    </button>
  </div>

  <div class="price-card">
    <h2>Годишња претплата: 30€</h2>
    <button onclick="alert('Софтвер још није спреман, али можете преузети алфа верзију овде: https://drive.google.com/file/d/1IZgpm5DGQhVbkGPssvxN9I4gC9uuy3fG/view?usp=sharing')">
      Пријави се
    </button>
  </div>
</div>

</body>
</html>
